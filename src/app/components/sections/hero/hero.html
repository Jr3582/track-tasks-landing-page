<div class="relative flex flex-col w-full h-screen overflow-hidden">
    <div class="flex w-full flex-col justify-center items-center mt-24 mx-auto max-w-2xl flex-nowrap shrink-0">
        <span class="flex text-8xl text-center font-serif text-white font-thin">Present With Confidence!</span>
        <hr class="border-1 border-gray-200 w-full mt-4 mb-2">
        <span class="text-center text-gray-700 text-xl font-serif">The simplest way to organize your work, track your progress, and get things done without the clutter.</span>
        <div class="group transition-all duration-500 group-has-[.pointer-events-auto:hover]:hover-btn">
            <button class="w-fit h-fit px-4 py-2 bg-gradient-to-b from-background to-white to-800% rounded-xl mt-4 font-serif font-bold text-white border-1 cursor-pointer pointer-events-auto shadow-2xl">
                Download
            </button>
            <div class="w-fit h-fit px-4 py-2 [mask-image:linear-gradient(to_bottom,transparent,black_500%)] bg-gradient-to-b from-background to-white to-800% rounded-xl font-serif font-bold text-white border-1 rotate-180 pointer-events-none">
                Download
            </div>
        </div>
    </div>
    <div class="flex w-screen no-scrollbar overscroll-hidden pointer-events-none overflow-hidden mt-auto mb-32"> <!-- CAROUSEL -->
        <div class="flex items-center justify-center animate-[slide_120s_linear_infinite]"> <!-- GROUP -->
            @for (obj of carouselObj; track obj) {
                <div class="card">
                    <img [src]="obj.img" class="h-full w-full object-cover">
                </div>
            }
        </div>
        <!-- GHOST OBJECTS -->
        <div aria-hidden class="flex items-center justify-center animate-[slide_120s_linear_infinite]"> <!-- GROUP -->
            @for (obj of carouselObj; track obj) {
                <div class="card">
                    <img [src]="obj.img" class="h-full w-full object-cover">
                </div>
            }
        </div>
    </div>
</div>
