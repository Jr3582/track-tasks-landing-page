<div class="flex flex-col w-screen h-screen">
    <span class="flex text-black text-4xl lg:text-6xl font-serif w-full leading-tight font-serif pl-6 pt-2 font-bold">Four Features We Offer</span>
    <div class="grid grid-cols-1 lg:grid-cols-2 w-full h-full mx-auto max-w-2xl lg:max-w-7xl p-2 lg:p-6 gap-1 lg:gap-4 mt-2 lg:mt-4">
        @for (feature of features; track feature) {
            <div class="bg-gradient-to-b from-background to-white to-500% rounded-xl lg:hover-ani">
                <div class="flex flex-col p-6">
                    <span class="lg:text-4xl text-md font-serif text-white font-bold pb-2">{{feature.featureName}}</span>
                    <span class="lg:text-4xl text-md font-serif text-white pt-2">{{feature.featureDescription}}</span>
                </div>
            </div>
        }
    </div>
</div>
